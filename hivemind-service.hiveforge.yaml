kind: component
component:
  name: service
  project: hivemind
deployment:
  adapter: ansible
  actions:
    deploy:
      playbook: deploy/hiveforge/deploy.yml
    remove:
      playbook: deploy/hiveforge/remove.yml
    purge:
      playbook: deploy/hiveforge/purge.yml
    update:
      playbook: deploy/hiveforge/update.yml
    upgrade:
      playbook: deploy/hiveforge/upgrade.yml
requirements:
  environment:
    - HIVEMIND_API_IMAGE
    - HIVEMIND_OPENSEARCH_USERNAME
    - HIVEMIND_OPENSEARCH_INDEX_PREFIX
    - HIVEMIND_OPENSEARCH_TLS_REJECT_UNAUTHORIZED
    - HIVEMIND_RULESET_CATALOG_PATH
    - HIVEMIND_API_PORT
    - HIVEMIND_MCP_PORT
