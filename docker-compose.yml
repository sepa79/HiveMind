services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:?OPENSEARCH_INITIAL_ADMIN_PASSWORD is required}
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -k -fsS -u admin:$$OPENSEARCH_INITIAL_ADMIN_PASSWORD https://127.0.0.1:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  opensearch-init:
    image: ${HIVEMIND_API_IMAGE:?HIVEMIND_API_IMAGE is required}
    restart: on-failure
    environment:
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:?OPENSEARCH_INITIAL_ADMIN_PASSWORD is required}
      HIVEMIND_OPENSEARCH_USERNAME: ${HIVEMIND_OPENSEARCH_USERNAME:?HIVEMIND_OPENSEARCH_USERNAME is required}
      HIVEMIND_OPENSEARCH_PASSWORD: ${HIVEMIND_OPENSEARCH_PASSWORD:?HIVEMIND_OPENSEARCH_PASSWORD is required}
      HIVEMIND_OPENSEARCH_NODE: ${HIVEMIND_OPENSEARCH_NODE:-https://opensearch:9200}
      HIVEMIND_OPENSEARCH_INDEX_PREFIX: ${HIVEMIND_OPENSEARCH_INDEX_PREFIX:-hivemind}
    command: ["node", "scripts/opensearch-init.mjs"]
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s

  hivemind-api:
    image: ${HIVEMIND_API_IMAGE:?HIVEMIND_API_IMAGE is required}
    restart: on-failure
    environment:
      HIVEMIND_API_PORT: "4010"
      HIVEMIND_STORAGE_BACKEND: opensearch
      HIVEMIND_OPENSEARCH_NODE: ${HIVEMIND_OPENSEARCH_NODE:-https://opensearch:9200}
      HIVEMIND_OPENSEARCH_INDEX_PREFIX: ${HIVEMIND_OPENSEARCH_INDEX_PREFIX:-hivemind}
      HIVEMIND_OPENSEARCH_USERNAME: ${HIVEMIND_OPENSEARCH_USERNAME:?HIVEMIND_OPENSEARCH_USERNAME is required}
      HIVEMIND_OPENSEARCH_PASSWORD: ${HIVEMIND_OPENSEARCH_PASSWORD:?HIVEMIND_OPENSEARCH_PASSWORD is required}
      HIVEMIND_OPENSEARCH_TLS_REJECT_UNAUTHORIZED: ${HIVEMIND_OPENSEARCH_TLS_REJECT_UNAUTHORIZED:-false}
    ports:
      - "4010:4010"
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s

volumes:
  opensearch-data:
