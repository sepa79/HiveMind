<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <style>
    .hex { fill:none; stroke:#FFC107; stroke-width:14; stroke-linejoin:round; }
    .path { fill:none; stroke:#ffffff; stroke-width:4.5; stroke-linecap:round; stroke-linejoin:round; }
    .node { fill:#0f1116; stroke:#FFC107; stroke-width:4; }
    .brand { font:800 76px 'Inter','Segoe UI',Arial,sans-serif; }
    .brandHive { fill:#FFC107; }
    .brandMind { fill:#ffffff; }
    .tagline { font:500 26px 'Inter','Segoe UI',Arial,sans-serif; fill:#999; }
    .shadow { filter:url(#textShadow); }
  </style>
  <defs>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g transform="translate(0,30)">
    <path class="hex" d="M110 20 190 65v90l-80 45-80-45V65z"/>
    <path class="path" d="M110 110V80"/>
    <path class="path" d="M110 110h26V90h18"/>
    <path class="path" d="M110 110h26v28h18"/>
    <path class="path" d="M110 110v30"/>
    <path class="path" d="M110 110H84V90H66"/>
    <path class="path" d="M110 110H84v28H66"/>
    <circle class="node" cx="110" cy="110" r="10"/>
    <circle class="node" cx="110" cy="80" r="7"/>
    <circle class="node" cx="154" cy="90" r="7"/>
    <circle class="node" cx="154" cy="138" r="7"/>
    <circle class="node" cx="110" cy="140" r="7"/>
    <circle class="node" cx="66" cy="90" r="7"/>
    <circle class="node" cx="66" cy="138" r="7"/>
  </g>
  <g transform="translate(260,148)" class="shadow">
    <text class="brand" x="0" y="0" textLength="420" lengthAdjust="spacingAndGlyphs">
      <tspan class="brandHive">Hive</tspan><tspan class="brandMind">Mind</tspan>
    </text>
    <text class="tagline" x="0" y="34" textLength="420" lengthAdjust="spacingAndGlyphs">shared project memory</text>
  </g>
