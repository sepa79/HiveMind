kind: project
version: "0.5"
project:
  name: hivemind
  repository: https://github.com/sepa79/HiveMind.git
  actions:
    - deploy
    - remove
    - purge
    - update
    - upgrade
  vars:
    imageRepository.project: ghcr.io/sepa79
    extRepository.docker: docker.io
    extRepository.ghcr: ghcr.io
  profiles:
    - id: docker-single
      runtime: docker-single
      serviceSet: shared-opensearch
      requires:
        managedRoot:
          required: true
          shared: true
    - id: swarm
      runtime: docker-swarm
      serviceSet: shared-opensearch
      requires:
        managedRoot:
          required: true
          shared: true
components:
  - name: service
    manifest: hivemind-service.hiveforge.yaml
