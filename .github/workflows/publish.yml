name: Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: "22"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm run test:hivemind

      - name: Pack MCP client
        run: npm run pack:mcp

      - name: Upload MCP package artifact
        uses: actions/upload-artifact@v4
        with:
          name: hivemind-mcp
          path: dist/hivemind-mcp-*.tgz
          if-no-files-found: error

  publish-api-image:
    name: Publish API Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: |
          IMAGE_NAME="$(printf 'ghcr.io/%s/hivemind-api' '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  attach-release-assets:
    name: Attach Release Assets
    runs-on: ubuntu-latest
    needs:
      - test
      - publish-api-image
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download MCP package artifact
        uses: actions/download-artifact@v4
        with:
          name: hivemind-mcp
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hivemind-mcp-*.tgz
          generate_release_notes: true
