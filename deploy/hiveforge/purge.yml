- name: Purge HiveMind stack and data
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Require explicit purge approval
      ansible.builtin.assert:
        that:
          - lookup('ansible.builtin.env', 'HIVEFORGE_PURGE_APPROVED') == 'true'
        fail_msg: "HIVEFORGE_PURGE_APPROVED=true must be set explicitly before purging HiveMind data."

    - name: Reject purge until HiveForge owns Docker purge execution
      ansible.builtin.fail:
        msg: "HiveMind purge requires HiveForge-owned Docker purge execution; project Ansible has no Docker access in contract 0.5."
